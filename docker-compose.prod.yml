version: "3.8"

services:
  portfolio:
    image: localhost:5001/portfolio:${IMAGE_TAG}
    container_name: portfolio
    ports:
      - "5080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - portfolio_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  portfolio_network:
    driver: bridge
